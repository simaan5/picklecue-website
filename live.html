<!DOCTYPE html>
<html lang="en" style="color-scheme: light dark;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script>(function(){try{var t=localStorage.getItem('pc_theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(_){}})();</script>
    <title>Live · PickleCue</title>
    <meta name="description" content="Live scores, brackets, and standings for PickleCue tournaments and leagues.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <meta name="theme-color" content="#F4F1EA" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0F1214" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="/fonts.css">
    <link rel="stylesheet" href="assets/live.css">
</head>
<body>
    <header class="live-head">
        <div class="page live-head-row">
            <a href="/" class="live-logo"><img src="images/app-icon-120.png" alt="">PickleCue</a>
            <span class="conn" id="conn"><span class="dot"></span><span id="connLabel">Connecting</span></span>
        </div>
    </header>

    <main class="page" id="main">
        <div class="state" id="loading"><h2>Loading…</h2><p>Fetching the latest scores.</p></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="assets/live-core.js"></script>
    <script src="assets/bracket.js"></script>
    <script>
    (function () {
        'use strict';
        var PC = window.PCLive, esc = PC.esc;
        var params = new URLSearchParams(location.search);
        var tid = params.get('t'), lid = params.get('l');
        var kind = tid ? 't' : (lid ? 'l' : null);
        var eventId = tid || lid;
        var main = document.getElementById('main');
        var snap = null;
        var activeTab = ['bracket', 'courts', 'me', 'register'].indexOf(params.get('view')) !== -1 ? params.get('view') : 'matches';
        var regInfo = null, regResult = null, myReg = null;
        var mePid = null;
        if (params.get('display') === 'tv') document.body.classList.add('bv-tv');
        var unsub = null;

        function setConn(state) {
            var el = document.getElementById('conn');
            el.className = 'conn' + (state === 'live' ? ' live' : '');
            document.getElementById('connLabel').textContent = state === 'live' ? 'Live' : 'Reconnecting…';
        }

        if (!kind || !/^[0-9a-f-]{36}$/i.test(eventId || '')) {
            main.innerHTML = '<div class="state"><h2>Event not found</h2><p>This link is missing its event. Ask the organizer for a fresh one.</p></div>';
            return;
        }

        // ---- rendering ------------------------------------------------------

        function nameFor(map, id, fallback) {
            return (id && map[id]) ? map[id] : (fallback || 'TBD');
        }

        function av(id) {
            return window.PCLive.avatarStack((objMap[id] || {}).members, 20);
        }
        var objMap = {};

        function matchCard(m, sideNames) {
            var live = m.live && m.status !== 'completed' ? m.live : null;
            var s1 = live ? live.score1 : scoreFromSummary(m.score_summary, 0);
            var s2 = live ? live.score2 : scoreFromSummary(m.score_summary, 1);
            var p1 = sideNames[0], p2 = sideNames[1];
            var w1 = m.status === 'completed' && m.winnerSide === 1;
            var w2 = m.status === 'completed' && m.winnerSide === 2;
            var isLive = m.status === 'in_progress';
            return '<div class="match-card' + (isLive ? ' live-now' : '') + '">' +
                '<div class="match-top"><span>' + esc(roundLabel(m)) + (m.court ? ' · ' + esc(m.court) : '') + '</span>' +
                (isLive ? '<span class="live-tag">● Live' + (live && live.game ? ' · Game ' + live.game : '') + '</span>'
                        : '<span>' + esc(PC.statusLabel(m.status)) + '</span>') + '</div>' +
                '<div class="match-row"><span class="team' + (w1 ? ' won' : '') + '">' + av(m.sideIds[0]) + ' ' + esc(p1) + '</span>' +
                '<span class="pts' + (w1 ? ' won' : '') + '">' + (s1 == null ? '–' : s1) + '</span></div>' +
                '<div class="match-row"><span class="team' + (w2 ? ' won' : '') + '">' + av(m.sideIds[1]) + ' ' + esc(p2) + '</span>' +
                '<span class="pts' + (w2 ? ' won' : '') + '">' + (s2 == null ? '–' : s2) + '</span></div>' +
                (m.status === 'completed' && m.score_summary && m.score_summary.indexOf(',') !== -1
                    ? '<div class="match-foot"><span>Games: ' + esc(m.score_summary) + '</span></div>' : '') +
                '</div>';
        }

        function scoreFromSummary(summary, side) {
            if (!summary) return null;
            var last = summary.split(',').pop().trim();
            var parts = last.split('-');
            if (parts.length !== 2) return null;
            var v = parseInt(parts[side], 10);
            return isNaN(v) ? null : v;
        }

        function roundLabel(m) {
            if (m.week) return 'Week ' + m.week;
            return m.round ? 'Round ' + m.round : 'Match ' + (m.match_number || '');
        }

        function sectionOf(title, cards, extraClass) {
            if (!cards.length) return '';
            return '<section class="section"><h2>' + title + ' <span class="count">' + cards.length + '</span></h2>' +
                '<div class="match-list ' + (extraClass || '') + '">' + cards.join('') + '</div></section>';
        }

        function render() {
            if (!snap) return;
            var isT = kind === 't';
            var head = isT ? snap.tournament : snap.league;
            var members = isT ? snap.participants : snap.members;
            var nameMap = {};
            objMap = {};
            (members || []).forEach(function (m) { nameMap[m.id] = m.name || 'Player'; objMap[m.id] = m; });

            var matches = (snap.matches || []).map(function (m) {
                var id1 = isT ? m.participant1_id : m.team1_member_id;
                var id2 = isT ? m.participant2_id : m.team2_member_id;
                var winner = isT ? m.winner_id : m.winner_member_id;
                m.sideIds = [id1, id2];
                m.sideNames = [nameFor(nameMap, id1), nameFor(nameMap, id2)];
                m.winnerSide = winner ? (winner === id1 ? 1 : 2) : 0;
                return m;
            });

            var liveCards = [], upcoming = [], done = [];
            matches.forEach(function (m) {
                var card = matchCard(m, m.sideNames);
                if (m.status === 'in_progress') liveCards.push(card);
                else if (m.status === 'completed') done.push(card);
                else upcoming.push(card);
            });

            var statusChip = head.status === 'in_progress' || head.status === 'active'
                ? '<span class="chip status-live">● Live now</span>'
                : head.status === 'completed'
                    ? '<span class="chip status-done">Completed</span>'
                    : '<span class="chip">' + esc(PC.statusLabel(head.status)) + '</span>';

            var html =
                '<div class="event-head">' +
                '<span class="kicker">' + (isT ? 'Tournament' : 'League') + ' · Live results</span>' +
                '<h1>' + esc(head.name) + '</h1>' +
                '<div class="event-meta">' + statusChip +
                (head.start_date ? '<span class="chip">' + esc(PC.fmtDate(head.start_date)) + '</span>' : '') +
                (head.format ? '<span class="chip">' + esc(head.format.replace(/_/g, ' ')) + '</span>' : '') +
                (isT && head.points_to_win ? '<span class="chip">To ' + head.points_to_win + (head.win_by_two ? ', win by 2' : '') + '</span>' : '') +
                (head.organizer_name ? '<span class="chip">Organizer: ' + esc(head.organizer_name) + '</span>' : '') +
                '</div>' +
                (myReg && activeTab !== 'register'
                    ? '<div class="bar" style="margin-top:14px"><span class="chip ' + (myReg.status === 'registered' ? 'status-done' : '') + '">' +
                      (myReg.status === 'registered' ? '\u2705 ' + esc(myReg.display_name) + ' — you\u2019re registered'
                          : myReg.status === 'waitlisted' ? esc(myReg.display_name) + ' — #' + myReg.waitlist_position + ' on the waitlist'
                          : esc(myReg.display_name) + ' — withdrawn') + '</span></div>'
                    : regInfo && regInfo.open && activeTab !== 'register'
                    ? '<div class="bar" style="margin-top:14px"><button class="btn primary" id="regCta">' +
                      (regInfo.spots_left > 0
                          ? 'Register — ' + regInfo.spots_left + (regInfo.spots_left === 1 ? ' spot' : ' spots') + ' left'
                          : (regInfo.waitlist_enabled ? 'Event full — join the waitlist' : 'Event full')) +
                      '</button>' +
                      (regInfo.partners_needed && regInfo.partners_needed.length
                          ? '<span class="chip">' + regInfo.partners_needed.length + ' looking for partners</span>' : '') +
                      '</div>' : '') +
                '<div class="tabs" role="tablist">' +
                tabBtn('matches', 'Matches') +
                (isT && window.PCBracket.isElimination(snap) ? tabBtn('bracket', 'Bracket') : '') +
                (matches.some(function (m) { return m.court; }) ? tabBtn('courts', 'Courts') : '') +
                tabBtn('me', 'My next match') +
                (isT ? '' : tabBtn('standings', 'Standings')) +
                tabBtn('players', isT ? 'Teams' : 'Members') +
                '</div></div>';

            if (activeTab === 'bracket' && !(kind === 't' && window.PCBracket.isElimination(snap))) activeTab = 'matches';
            if (activeTab === 'courts' && !matches.some(function (m) { return m.court; })) activeTab = 'matches';
            if (activeTab === 'register') {
                html += registerView();
            } else if (activeTab === 'courts') {
                html += courtBoard(matches);
            } else if (activeTab === 'me') {
                html += whatsNext(matches, members || []);
            } else if (activeTab === 'bracket') {
                html += '<section class="section"><div id="bvHost"></div></section>';
            } else if (activeTab === 'matches') {
                html += sectionOf('Live now', liveCards);
                html += sectionOf('Upcoming', upcoming.slice(0, 24));
                html += sectionOf('Completed', done);
                if (!matches.length) html += '<div class="state"><h2>No matches yet</h2><p>The schedule will appear here as soon as the organizer publishes it.</p></div>';
            } else if (activeTab === 'standings') {
                html += standingsTable(nameMap);
            } else {
                html += membersTable(members || []);
            }

            html += '<p class="foot-note">Scores update automatically — no refresh needed. Powered by <a href="/">PickleCue</a>.</p>';
            main.innerHTML = html;
            if (activeTab === 'bracket') {
                window.PCBracket.render(document.getElementById('bvHost'), snap, {});
            }
            var regCta = document.getElementById('regCta');
            if (regCta) regCta.addEventListener('click', function () {
                if (regInfo.spots_left === 0 && !regInfo.waitlist_enabled) return;
                activeTab = 'register'; regResult = null; render();
            });
            if (activeTab === 'register') wireRegister();
            if (activeTab === 'me') {
                var search = document.getElementById('meSearch');
                if (search) search.addEventListener('input', function () {
                    Array.prototype.forEach.call(main.querySelectorAll('[data-me-pick]'), function (b) {
                        b.style.display = b.textContent.toLowerCase().indexOf(search.value.toLowerCase()) !== -1 ? '' : 'none';
                    });
                });
                Array.prototype.forEach.call(main.querySelectorAll('[data-me-pick]'), function (b) {
                    b.addEventListener('click', function () {
                        mePid = b.dataset.mePick;
                        try { localStorage.setItem('pc_me_' + eventId, mePid); } catch (_) {}
                        render();
                    });
                });
                var clearBtn = document.getElementById('meClear');
                if (clearBtn) clearBtn.addEventListener('click', function () {
                    mePid = null;
                    try { localStorage.removeItem('pc_me_' + eventId); } catch (_) {}
                    render();
                });
            }

            Array.prototype.forEach.call(main.querySelectorAll('.tab'), function (b) {
                b.addEventListener('click', function () { activeTab = b.dataset.tab; render(); });
            });
        }

        function tabBtn(id, label) {
            return '<button class="tab" role="tab" data-tab="' + id + '" aria-selected="' + (activeTab === id) + '">' + label + '</button>';
        }

        // ---- Registration ------------------------------------------------------
        function registerView() {
            if (!regInfo || !regInfo.open) {
                return '<div class="state"><h2>Registration is closed</h2><p>Ask the organizer if you think this is a mistake.</p></div>';
            }
            if (regResult) {
                var waitlisted = regResult.status === 'waitlisted';
                var pos = myReg && myReg.status === 'waitlisted' ? myReg.waitlist_position : null;
                return '<section class="section"><div class="me-card' + (waitlisted ? '' : ' me-live') + '" style="border-color:var(--court);box-shadow:none">' +
                    '<div class="me-status" style="color:var(--court)">' + (waitlisted ? 'YOU\u2019RE ON THE WAITLIST' + (pos ? ' \u2014 #' + pos : '') : '\u2705 YOU\u2019RE REGISTERED') + '</div>' +
                    '<div class="me-sub" style="font-size:15px;margin-top:10px">' +
                    (waitlisted
                        ? 'The event is full right now. The organizer can move you in if a spot opens \u2014 keep an eye on this page.'
                        : 'See you on event day \u2014 check in at the desk when you arrive, then this page will tell you where to play.') +
                    '</div>' +
                    '<div class="bar" style="justify-content:center;margin-top:18px">' +
                    '<button class="btn ghost" id="regBackBtn">Back to the event</button></div></div></section>';
            }
            var isLeague = kind === 'l';
            var doubles = regInfo.require_partner || regInfo.allow_need_partner;
            return '<section class="section" style="max-width:480px"><h2>Register for this event</h2>' +
                (isLeague ? '<p class="bnote" id="regLeagueNote" style="margin-bottom:12px">Joining a league uses your PickleCue account \u2014 you\u2019ll be asked to sign in when you submit.</p>' : '') +
                '<div class="field"><label>Your name *</label><input id="rName" maxlength="80" autocomplete="name"></div>' +
                '<div class="field"><label>Email</label><input id="rEmail" type="email" maxlength="254" autocomplete="email"></div>' +
                '<div class="field"><label>Phone (optional)</label><input id="rPhone" type="tel" maxlength="30" autocomplete="tel"></div>' +
                '<div class="field"><label>Skill level (optional)</label><input id="rSkill" maxlength="20" placeholder="e.g. 3.5"></div>' +
                (regInfo.require_dupr
                    ? '<div class="field"><label>DUPR ID *</label><input id="rDupr" maxlength="40"></div>'
                    : '<div class="field"><label>DUPR ID (optional)</label><input id="rDupr" maxlength="40"></div>') +
                (doubles
                    ? '<div class="field"><label>Partner</label><select id="rPartnerMode">' +
                      (!regInfo.require_partner ? '<option value="none">Playing solo / not applicable</option>' : '') +
                      '<option value="complete">I have a partner</option>' +
                      (regInfo.allow_need_partner ? '<option value="needed">I need a partner</option>' : '') +
                      '</select></div>' +
                      '<div class="field" id="rPartnerNameWrap" hidden><label>Partner\u2019s name</label><input id="rPartnerName" maxlength="80"></div>'
                    : '') +
                '<div class="field"><label>Note to the organizer (optional)</label><input id="rNotes" maxlength="500"></div>' +
                '<label class="bcheck" style="padding:6px 0 14px"><input type="checkbox" id="rTerms">' +
                '<span style="font-size:13.5px;color:var(--ink-soft)">I agree to the event rules and PickleCue\u2019s <a href="terms.html" target="_blank" rel="noopener">Terms</a> &amp; <a href="privacy.html" target="_blank" rel="noopener">Privacy Policy</a>, and I understand the event organizer can see my registration details.</span></label>' +
                '<button class="btn primary block" id="regSubmit">' +
                (regInfo.spots_left > 0 ? 'Register' : 'Join the waitlist') + '</button>' +
                '<p class="err" id="regErr"></p></section>' +
                (regInfo.partners_needed && regInfo.partners_needed.length
                    ? '<section class="section"><h2>Looking for partners <span class="count">' + regInfo.partners_needed.length + '</span></h2>' +
                      regInfo.partners_needed.map(function (x) {
                          return '<div class="event-row"><div class="grow"><div class="title">' + esc(x.name) + '</div>' +
                              (x.skill ? '<div class="sub">Skill ' + esc(x.skill) + '</div>' : '') + '</div>' +
                              '<span class="sub">Pick \u201cI need a partner\u201d and the organizer can pair you</span></div>';
                      }).join('') + '</section>'
                    : '');
        }

        function wireRegister() {
            var back = document.getElementById('regBackBtn');
            if (back) { back.addEventListener('click', function () { activeTab = 'matches'; refetch(); }); return; }
            var mode = document.getElementById('rPartnerMode');
            if (mode) mode.addEventListener('change', function () {
                document.getElementById('rPartnerNameWrap').hidden = mode.value !== 'complete';
            });
            var btn = document.getElementById('regSubmit');
            if (!btn) return;
            btn.addEventListener('click', async function () {
                var err = document.getElementById('regErr');
                err.textContent = '';
                if (!document.getElementById('rTerms').checked) { err.textContent = 'Please agree to the event rules and terms first.'; return; }
                btn.disabled = true;
                try {
                    var r = await PC.client.rpc('register_for_event', {
                        p_scope: kind === 't' ? 'tournament' : 'league',
                        p_event_id: eventId,
                        p_display_name: document.getElementById('rName').value,
                        p_email: document.getElementById('rEmail').value || null,
                        p_phone: document.getElementById('rPhone').value || null,
                        p_skill_level: document.getElementById('rSkill').value || null,
                        p_dupr_id: document.getElementById('rDupr').value || null,
                        p_partner_status: mode ? mode.value : 'none',
                        p_partner_name: mode && mode.value === 'complete' ? (document.getElementById('rPartnerName').value || null) : null,
                        p_notes: document.getElementById('rNotes').value || null,
                    });
                    if (r.error) throw r.error;
                    regResult = r.data;
                    try { localStorage.setItem('pc_reg_' + eventId, r.data.registration_id); } catch (_) {}
                    await refetch();
                } catch (e) {
                    err.textContent = e.message || 'Registration failed — try again.';
                    btn.disabled = false;
                }
            });
        }

        // ---- Court Board -----------------------------------------------------
        function courtBoard(matches) {
            var byCourt = {};
            matches.forEach(function (m) { if (m.court) (byCourt[m.court] = byCourt[m.court] || []).push(m); });
            var courts = Object.keys(byCourt).sort(function (a, b) {
                var na = parseInt(a.replace(/\D+/g, ''), 10), nb = parseInt(b.replace(/\D+/g, ''), 10);
                return (isNaN(na) ? 999 : na) - (isNaN(nb) ? 999 : nb) || a.localeCompare(b);
            });
            var cards = courts.map(function (court) {
                var ms = byCourt[court];
                var live = ms.find(function (m) { return m.status === 'in_progress'; });
                var onDeck = ms.filter(function (m) {
                    return (m.status === 'pending' || m.status === 'scheduled') && m.sideIds[0] && m.sideIds[1];
                }).sort(function (a, b) { return (a.round || 0) - (b.round || 0); })[0];
                var lastDone = ms.filter(function (m) { return m.status === 'completed'; })
                    .sort(function (a, b) { return (b.round || 0) - (a.round || 0); })[0];

                var cls, statusLine, body;
                if (live) {
                    var s1 = live.live ? live.live.score1 : null, s2 = live.live ? live.live.score2 : null;
                    cls = 'cb-live'; statusLine = '● LIVE';
                    body = cbTeams(live) +
                        '<div class="cb-score">' + (s1 == null ? '–' : s1) + '<span>:</span>' + (s2 == null ? '–' : s2) + '</div>';
                } else if (onDeck) {
                    cls = 'cb-ondeck'; statusLine = 'ON DECK';
                    var waiting = onDeck.sideIds.some(function (id) {
                        return id && (objMap[id] || {}).check_in === 'not_checked_in';
                    });
                    body = cbTeams(onDeck) + '<div class="cb-sub">' + esc(roundLabel(onDeck)) +
                        (waiting ? ' \u00b7 Waiting on players' : '') + '</div>';
                } else if (lastDone) {
                    cls = 'cb-open'; statusLine = 'OPEN';
                    body = '<div class="cb-sub">Last: ' + esc(lastDone.sideNames[0]) + ' def. ' +
                        esc(lastDone.sideNames[lastDone.winnerSide === 1 ? 1 : 0]) + ' ' + esc(lastDone.score_summary || '') + '</div>' +
                        '<div class="cb-free">Court free</div>';
                } else {
                    cls = 'cb-open'; statusLine = 'OPEN';
                    body = '<div class="cb-free">Court free</div>';
                }
                return '<div class="cb-card ' + cls + '"><div class="cb-head"><span class="cb-court">' + esc(court) +
                    '</span><span class="cb-status">' + statusLine + '</span></div>' + body + '</div>';
            });
            if (!cards.length) return '<div class="state"><h2>No court assignments yet</h2></div>';
            return '<section class="section"><div class="cb-grid">' + cards.join('') + '</div></section>';
        }

        function cbTeams(m) {
            return '<div class="cb-team">' + av(m.sideIds[0]) + '<span>' + esc(m.sideNames[0]) + '</span></div>' +
                '<div class="cb-vs">vs</div>' +
                '<div class="cb-team">' + av(m.sideIds[1]) + '<span>' + esc(m.sideNames[1]) + '</span></div>';
        }

        // ---- Player "What\u2019s Next?" ---------------------------------------
        function whatsNext(matches, members) {
            try { if (!mePid) mePid = localStorage.getItem('pc_me_' + eventId); } catch (_) {}
            var me = mePid ? objMap[mePid] : null;
            if (!me) {
                return '<section class="section"><h2>Who are you following?</h2>' +
                    '<div class="field" style="max-width:340px;margin-bottom:12px"><input id="meSearch" type="search" placeholder="Find your name or team\u2026" style="font-size:16px;padding:12px 14px;border:1px solid var(--rule-strong);border-radius:10px;background:var(--paper);color:var(--ink);width:100%"></div>' +
                    members.map(function (m) {
                        return '<button class="event-row" data-me-pick="' + m.id + '" style="width:100%;text-align:left;border:1px solid var(--rule);background:var(--paper-2);cursor:pointer">' +
                            '<div class="grow"><div class="title">' + window.PCLive.avatarStack(m.members, 22) + ' ' + esc(m.name || 'Player') + '</div></div>' +
                            '<span class="sub">Follow \u2192</span></button>';
                    }).join('') + '</section>';
            }

            var mine = matches.filter(function (m) { return m.sideIds[0] === mePid || m.sideIds[1] === mePid; });
            var done = mine.filter(function (m) { return m.status === 'completed'; });
            var wins = done.filter(function (m) { return (m.winnerSide === 1 ? m.sideIds[0] : m.sideIds[1]) === mePid; }).length;
            var next = mine.filter(function (m) { return m.status !== 'completed' && m.status !== 'bye'; })
                .sort(function (a, b) { return (a.round || 0) - (b.round || 0); })[0];
            var last = done.sort(function (a, b) { return (b.round || 0) - (a.round || 0); })[0];

            var big;
            if (next) {
                var oppId = next.sideIds[0] === mePid ? next.sideIds[1] : next.sideIds[0];
                var opp = oppId ? (objMap[oppId] || {}) : null;
                var isLive = next.status === 'in_progress';
                var ready = next.sideIds[0] && next.sideIds[1];
                big = '<div class="me-card' + (isLive ? ' me-live' : '') + '">' +
                    '<div class="me-status">' + (isLive ? '\u25CF PLAYING NOW' : (ready ? 'YOU\u2019RE ON DECK' : 'WAITING ON EARLIER RESULTS')) + '</div>' +
                    (next.court ? '<div class="me-court">' + esc(next.court) + '</div>' : '<div class="me-court me-tbd">Court TBD</div>') +
                    '<div class="me-opp">' + (opp ? 'vs ' + window.PCLive.avatarStack(opp.members, 26) + ' ' + esc(opp.name || 'TBD') : 'Opponent TBD') + '</div>' +
                    (isLive && next.live ? '<div class="cb-score">' + next.live.score1 + '<span>:</span>' + next.live.score2 + '</div>' : '') +
                    '<div class="me-sub">' + esc(roundLabel(next)) + '</div></div>';
            } else if (done.length && kind === 't') {
                var champ = last && (last.winnerSide === 1 ? last.sideIds[0] : last.sideIds[1]) === mePid && !matches.some(function (m) { return m.status !== 'completed' && m.status !== 'bye'; });
                big = '<div class="me-card"><div class="me-status">' + (champ ? '\uD83C\uDFC6 CHAMPION!' : 'YOUR EVENT IS COMPLETE') + '</div>' +
                    '<div class="me-sub">Thanks for playing \u2014 full results below.</div></div>';
            } else {
                big = '<div class="me-card"><div class="me-status">NO UPCOMING MATCHES</div>' +
                    '<div class="me-sub">Check back \u2014 this page updates live.</div></div>';
            }

            var ciChip = me.check_in === 'checked_in'
                ? '<span class="ci-chip ci-ready">CHECKED IN</span>'
                : me.check_in === 'no_show'
                    ? '<span class="ci-chip ci-noshow">NO-SHOW \u2014 SEE THE DESK</span>'
                    : '<span class="ci-chip ci-waiting">NOT CHECKED IN \u2014 CHECK IN AT THE DESK</span>';
            return '<section class="section">' +
                '<div class="me-who">' + window.PCLive.avatarStack(me.members, 28) + ' <strong>' + esc(me.name) + '</strong> ' + ciChip +
                '<button class="btn ghost" id="meClear" style="margin-left:auto;min-height:34px;padding:6px 14px;font-size:12px">Not you?</button></div>' +
                big +
                '<div class="me-stats">' +
                '<div class="me-stat"><span>' + wins + '\u2013' + (done.length - wins) + '</span>Record</div>' +
                '<div class="me-stat"><span>' + done.length + '</span>Played</div>' +
                (last ? '<div class="me-stat me-wide"><span>' + esc(last.score_summary || '\u2014') + '</span>Last: vs ' + esc(last.sideIds[0] === mePid ? last.sideNames[1] : last.sideNames[0]) + '</div>' : '') +
                '</div></section>';
        }

        function standingsTable(nameMap) {
            var rows = (snap.standings || []).map(function (s, i) {
                return '<tr class="' + (i < 3 ? 'top' : '') + '">' +
                    '<td class="num">' + (s.rank || i + 1) + '</td>' +
                    '<td class="name">' + window.PCLive.avatarStack((objMap[s.member_id] || {}).members, 20) + ' ' + esc(nameFor(nameMap, s.member_id)) + '</td>' +
                    '<td class="num">' + s.wins + '</td><td class="num">' + s.losses + '</td>' +
                    '<td class="num">' + (s.points_for ?? '–') + '</td><td class="num">' + (s.points_against ?? '–') + '</td>' +
                    '<td class="num">' + (s.point_differential > 0 ? '+' : '') + (s.point_differential ?? '–') + '</td>' +
                    '<td class="num">' + (s.win_percentage != null ? Number(s.win_percentage).toFixed(1) + '%' : '–') + '</td></tr>';
            }).join('');
            if (!rows) return '<div class="state"><h2>No standings yet</h2><p>Standings appear after the first completed match.</p></div>';
            return '<section class="section"><h2>Standings</h2><div class="table-wrap"><table class="live-table">' +
                '<thead><tr><th class="num">#</th><th>Team</th><th class="num">W</th><th class="num">L</th><th class="num">PF</th><th class="num">PA</th><th class="num">Diff</th><th class="num">Win %</th></tr></thead>' +
                '<tbody>' + rows + '</tbody></table></div></section>';
        }

        function membersTable(members) {
            var isT = kind === 't';
            var rows = members.map(function (m) {
                return '<tr><td class="num">' + (m.seed || '–') + '</td><td class="name">' + window.PCLive.avatarStack(m.members, 20) + ' ' + esc(m.name || 'Player') + '</td>' +
                    '<td>' + esc(PC.statusLabel(m.status)) + '</td>' +
                    (isT ? '<td class="num">' + (m.placement ? '#' + m.placement : '–') + '</td>' : '') + '</tr>';
            }).join('');
            if (!rows) return '<div class="state"><h2>No one has joined yet</h2></div>';
            return '<section class="section"><h2>' + (isT ? 'Teams' : 'Members') + ' <span class="count">' + members.length + '</span></h2>' +
                '<div class="table-wrap"><table class="live-table"><thead><tr><th class="num">Seed</th><th>Name</th><th>Status</th>' +
                (isT ? '<th class="num">Place</th>' : '') + '</tr></thead><tbody>' + rows + '</tbody></table></div></section>';
        }

        // ---- data + realtime --------------------------------------------------

        async function refetch() {
            try {
                var results = await Promise.all([
                    kind === 't' ? PC.tournamentSnapshot(eventId) : PC.leagueSnapshot(eventId),
                    PC.client.rpc('event_registration_info', { p_scope: kind === 't' ? 'tournament' : 'league', p_event_id: eventId }),
                ]);
                snap = results[0];
                regInfo = results[1].data || null;
                try {
                    var regId = localStorage.getItem('pc_reg_' + eventId);
                    if (regId) {
                        var rs = await PC.client.rpc('registration_status', { p_registration_id: regId });
                        myReg = rs.data || null;
                    }
                } catch (_) {}
            } catch (e) {
                console.error('[live] snapshot failed', e);
                return;
            }
            if (!snap) {
                if (unsub) unsub();
                main.innerHTML = '<div class="state"><h2>This event isn’t public</h2>' +
                    '<p>It may be private or no longer exist. If you’re part of it, open it in the PickleCue app.</p></div>';
                return;
            }
            document.title = ((kind === 't' ? snap.tournament : snap.league).name || 'Live') + ' · PickleCue';
            render();
        }

        (async function init() {
            await refetch();
            if (!snap) return;
            var isPublic = (kind === 't' ? snap.tournament : snap.league).is_public === true;
            unsub = PC.subscribeLive(kind, eventId, isPublic, refetch, setConn);
        })();
    })();
    </script>
</body>
</html>
