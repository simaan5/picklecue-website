name: Store CI (Inland Empire Electronics)

# Lints the custom theme/plugins and runs the Python importer tests.
# Scoped to the inland-empire-store/ directory so it never affects the
# PickleCue marketing site that also lives in this repo.
#
# Runs on GitHub-hosted runners by default. To use the Pi #1 'builder'
# self-hosted runner instead, change `runs-on:` to: [self-hosted, linux, ARM64]

on:
  push:
    paths:
      - 'inland-empire-store/**'
      - '.github/workflows/store-ci.yml'
  pull_request:
    paths:
      - 'inland-empire-store/**'

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Lint PHP (theme + plugins)
        run: |
          find inland-empire-store/wp-content -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        working-directory: inland-empire-store/importer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        working-directory: inland-empire-store/importer
        run: python -m pytest -q

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck inland-empire-store/scripts/*.sh || true
