<!DOCTYPE html>
<html lang="en" style="color-scheme: light;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Out of bounds · PickleCue</title>
    <meta name="robots" content="noindex,follow">

    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <meta name="theme-color" content="#F4F1EA">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" referrerpolicy="no-referrer">

    <style>
        :root {
            --paper: #F4F1EA; --paper-2: #EAE5D9;
            --ink: #0C0F12; --ink-soft: #3D4248; --ink-mute: #6E7278;
            --rule: rgba(12,15,18,0.12); --rule-strong: rgba(12,15,18,0.28);
            --court: #2E5E4E; --citron: #C8E04E; --clay: #D3511A;
            --f-display: 'Fraunces', Georgia, serif;
            --f-body: 'Instrument Sans', -apple-system, sans-serif;
            --f-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
            --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
            --page-max: 1240px; --gutter: clamp(20px, 4vw, 44px);
        }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: var(--f-body); font-size: 17px; line-height: 1.6;
            color: var(--ink); background: var(--paper);
            -webkit-font-smoothing: antialiased;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }
        body::before { content: ""; position: fixed; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(12,15,18,0.035) 1px, transparent 0); background-size: 3px 3px; pointer-events: none; z-index: 0; mix-blend-mode: multiply; }
        img, svg { display: block; max-width: 100%; }
        a { color: inherit; text-decoration: none; }
        :focus-visible { outline: 2px solid var(--court); outline-offset: 3px; border-radius: 2px; }

        .page { position: relative; z-index: 1; max-width: var(--page-max); margin: 0 auto; padding: 0 var(--gutter); width: 100%; }

        .kicker { font-family: var(--f-mono); font-size: 12px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); display: inline-flex; align-items: center; gap: 10px; }
        .kicker::before { content: ""; width: 28px; height: 1px; background: var(--rule-strong); }

        .masthead { border-bottom: 1px solid var(--rule); background: rgba(244,241,234,0.88); backdrop-filter: saturate(1.4) blur(14px); -webkit-backdrop-filter: saturate(1.4) blur(14px); }
        .masthead-row { display: flex; align-items: center; justify-content: space-between; height: 68px; gap: 24px; }
        .masthead-logo { display: inline-flex; align-items: baseline; gap: 10px; font-family: var(--f-display); font-size: 1.35rem; font-weight: 600; letter-spacing: -0.02em; color: var(--ink); font-variation-settings: "opsz" 36, "SOFT" 30; }
        .masthead-logo img { width: 30px; height: 30px; border-radius: 6px; align-self: center; }
        .nav-back {
            display: inline-flex; align-items: center; gap: 8px;
            font-family: var(--f-mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--ink); padding: 10px 12px;
            min-height: 44px;
        }
        .nav-back::before { content: "←"; transition: transform 0.2s var(--ease); }
        .nav-back:hover::before { transform: translateX(-4px); }

        /* Error content */
        .error {
            flex: 1;
            display: flex; align-items: center;
            padding: clamp(56px, 10vw, 140px) 0;
        }
        .error-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
            gap: clamp(32px, 6vw, 80px);
            align-items: center;
            width: 100%;
        }
        .error-big {
            font-family: var(--f-display);
            font-weight: 400;
            font-style: italic;
            color: var(--court);
            font-size: clamp(8rem, 24vw, 22rem);
            line-height: 0.78;
            letter-spacing: -0.06em;
            font-variation-settings: "opsz" 144, "SOFT" 100;
            position: relative;
            user-select: none;
        }
        .error-big .dot {
            display: inline-block;
            width: 0.18em; height: 0.18em; border-radius: 50%;
            background: var(--citron);
            vertical-align: 0.12em;
            margin: 0 0.04em;
        }
        .error-copy h1 {
            font-family: var(--f-display);
            font-size: clamp(2rem, 4.2vw, 3rem);
            font-weight: 500;
            line-height: 1.05;
            letter-spacing: -0.02em;
            margin: 24px 0 20px;
            font-variation-settings: "opsz" 96, "SOFT" 20;
            max-width: 18ch;
        }
        .error-copy h1 em { font-style: italic; color: var(--court); font-weight: 400; font-variation-settings: "opsz" 96, "SOFT" 100; }
        .error-copy p {
            color: var(--ink-soft);
            max-width: 40ch;
            margin-bottom: 36px;
        }
        .error-actions { display: flex; flex-wrap: wrap; gap: 12px; }
        .btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 13px 22px;
            border-radius: 100px;
            font-size: 15px; font-weight: 500;
            min-height: 48px;
            transition: transform 0.15s var(--ease), background 0.2s var(--ease), color 0.2s var(--ease), border-color 0.2s var(--ease);
        }
        .btn svg { width: 12px; height: 12px; }
        .btn-primary { background: var(--ink); color: var(--paper); }
        .btn-primary:hover { background: var(--court); transform: translateY(-1px); }
        .btn-secondary { background: transparent; color: var(--ink); border: 1px solid var(--rule-strong); }
        .btn-secondary:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); transform: translateY(-1px); }

        /* Footer — minimal */
        .colophon-mini {
            border-top: 1px solid var(--rule);
            padding: 28px 0;
            font-family: var(--f-mono); font-size: 11px;
            letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--ink-mute);
        }
        .colophon-mini-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .colophon-mini a { color: var(--ink-soft); }
        .colophon-mini a:hover { color: var(--ink); }
        .colophon-mini-links { display: flex; gap: 28px; flex-wrap: wrap; }

        /* Responsive */
        @media (max-width: 860px) {
            .error-grid { grid-template-columns: 1fr; gap: 24px; }
            .error-big { font-size: clamp(7rem, 35vw, 14rem); }
        }
        @media (max-width: 520px) {
            .colophon-mini-row { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <header class="masthead" role="banner">
        <div class="page masthead-row">
            <a href="/" class="masthead-logo" aria-label="PickleCue home">
                <img src="images/app-icon-120.png" alt="" width="30" height="30" aria-hidden="true">
                <span>PickleCue</span>
            </a>
            <a href="/" class="nav-back">Back to home</a>
        </div>
    </header>

    <main class="error">
        <div class="page error-grid">
            <div class="error-big" aria-hidden="true">4<span class="dot"></span>4</div>
            <div class="error-copy">
                <span class="kicker">Error · Out of bounds</span>
                <h1>This page is <em>out of bounds.</em></h1>
                <p>The page you&rsquo;re looking for doesn&rsquo;t exist, or it&rsquo;s been moved to a new address. Try one of the links below to get back in play.</p>
                <div class="error-actions">
                    <a href="/" class="btn btn-primary">
                        Back to home
                        <svg viewBox="0 0 12 12" aria-hidden="true"><path d="M1 6h10M7 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="square"/></svg>
                    </a>
                    <a href="support.html" class="btn btn-secondary">Get support</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="colophon-mini" role="contentinfo">
        <div class="page colophon-mini-row">
            <span>&copy; 2026 PickleCue</span>
            <div class="colophon-mini-links">
                <a href="privacy.html">Privacy</a>
                <a href="terms.html">Terms</a>
                <a href="support.html">Support</a>
                <a href="/#waitlist">Waitlist</a>
            </div>
        </div>
    </footer>
</body>
</html>
