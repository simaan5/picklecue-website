<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - PickleCue</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <meta name="theme-color" content="#0A1628">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald: #059669;
            --emerald-light: #6EE7B7;
            --emerald-dark: #047857;
            --midnight: #0A1628;
            --white: #FFFFFF;
            --cloud: #F1F5F9;
            --muted: #94A3B8;
        }
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 1rem;
            line-height: 1.8;
            background: var(--midnight);
            color: var(--cloud);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 20px 20px 0;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
        }
        .nav-logo img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }
        .nav-back {
            display: inline-block;
            padding: 8px 18px;
            background: var(--emerald-dark);
            color: var(--white);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .nav-back:hover {
            background: var(--emerald);
        }
        .error-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            color: var(--emerald);
            line-height: 1;
            margin-bottom: 16px;
        }
        .error-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--emerald-light);
            margin-bottom: 12px;
        }
        .error-message {
            color: var(--muted);
            font-size: 1.05rem;
            max-width: 420px;
            margin-bottom: 40px;
        }
        .error-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 1rem;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-primary {
            background: var(--emerald);
            color: var(--white);
        }
        .btn-primary:hover {
            background: var(--emerald-light);
            color: var(--midnight);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--cloud);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--white);
        }
        footer {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
        }
        .footer-links {
            margin-top: 8px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-links a:hover {
            color: var(--emerald-light);
        }
        @media (max-width: 480px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.4rem; }
            nav { padding: 16px 16px 0; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">
            <img src="images/app-icon-120.png" alt="PickleCue" width="36" height="36">
            PickleCue
        </a>
        <a href="/" class="nav-back">Back to Home</a>
    </nav>

    <div class="error-content">
        <div class="error-code">404</div>
        <h1 class="error-title">Page not found</h1>
        <p class="error-message">The page you're looking for doesn't exist or has been moved.</p>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">Go Home</a>
            <a href="support.html" class="btn btn-secondary">Get Support</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PickleCue. All rights reserved.</p>
        <div class="footer-links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Service</a>
            <a href="support.html">Support</a>
        </div>
    </footer>
</body>
</html>
