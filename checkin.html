<!DOCTYPE html>
<html lang="en" style="color-scheme: light dark;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script>(function(){try{var t=localStorage.getItem('pc_theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(_){}})();</script>
    <title>Check-In Desk · PickleCue</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <meta name="theme-color" content="#F4F1EA" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0F1214" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="/fonts.css">
    <link rel="stylesheet" href="assets/live.css?v=rr4">
</head>
<body>
    <header class="live-head">
        <div class="page live-head-row">
            <a href="/" class="live-logo"><img src="images/app-icon-120.png" alt="">Check-In Desk</a>
            <span class="conn" id="conn" hidden><span class="dot"></span><span id="connLabel">Live</span></span>
        </div>
    </header>

    <main class="page" id="main"><div class="state"><h2>Loading…</h2></div></main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="assets/live-core.js?v=rr4"></script>
    <script>
    (function () {
        'use strict';
        var PC = window.PCLive, esc = PC.esc, db = PC.client;
        var params = new URLSearchParams(location.search);
        var kind = params.get('t') ? 't' : (params.get('l') ? 'l' : null);
        var eventId = params.get('t') || params.get('l');
        var scope = kind === 't' ? 'tournament' : 'league';
        var main = document.getElementById('main');
        var snap = null, readiness = {}, search = '', unsub = null, waiver = null;

        if (!kind || !/^[0-9a-f-]{36}$/i.test(eventId || '')) {
            main.innerHTML = '<div class="state"><h2>Missing event link</h2><p>Open this page from the organizer dashboard (QR codes &amp; posters → Check-in desk).</p></div>';
            return;
        }

        function setConn(state) {
            var el = document.getElementById('conn');
            el.hidden = false;
            el.className = 'conn' + (state === 'live' ? ' live' : '');
            document.getElementById('connLabel').textContent = state === 'live' ? 'Live' : 'Reconnecting…';
        }

        function renderLogin() {
            PC.renderAuthCard(main, { title: 'Staff sign in', blurb: 'Check-in is for the event organizer and assigned staff.', onSignedIn: async function () { await boot(); } });
        }

        async function boot() {
            main.innerHTML = '<div class="state"><h2>Checking your assignment…</h2></div>';
            var check = await db.rpc(kind === 't' ? 'is_tournament_scorer' : 'is_league_scorer',
                kind === 't' ? { p_tournament_id: eventId } : { p_league_id: eventId });
            if (check.error || check.data !== true) {
                main.innerHTML = '<div class="state"><h2>You’re not assigned to this event</h2>' +
                    '<p>Have a staff code from the organizer? Enter it below — or ask them to add you in the app (event › Players › Staff).</p>' +
                    '<div class="bar" style="justify-content:center;margin:16px 0"><input id="staffCode" maxlength="6" placeholder="STAFF CODE" ' +
                    'style="font-family:var(--f-mono);font-size:18px;letter-spacing:0.2em;text-transform:uppercase;text-align:center;width:180px;padding:12px;border:1px solid var(--rule-strong);border-radius:10px;background:var(--paper);color:var(--ink)">' +
                    '<button class="btn primary" id="claimBtn">Join staff</button></div>' +
                    '<p class="err" id="claimErr"></p></div>';
                document.getElementById('claimBtn').addEventListener('click', async function () {
                    var code = document.getElementById('staffCode').value.trim();
                    if (code.length !== 6) { document.getElementById('claimErr').textContent = 'Codes are 6 characters.'; return; }
                    this.disabled = true;
                    var r = await db.rpc('claim_staff_code', { p_code: code });
                    if (r.error) { document.getElementById('claimErr').textContent = r.error.message; this.disabled = false; return; }
                    await boot();
                });
                return;
            }
            await refetch();
            if (!snap) return;
            var head = kind === 't' ? snap.tournament : snap.league;
            unsub = PC.subscribeLive(kind, eventId, head.is_public === true, refetch, setConn);
        }

        async function refetch() {
            var results = await Promise.all([
                kind === 't' ? PC.tournamentSnapshot(eventId) : PC.leagueSnapshot(eventId),
                db.rpc('event_readiness', { p_scope: scope, p_event_id: eventId }),
                db.rpc('get_event_waiver', { p_scope: scope, p_event_id: eventId }),
            ]);
            snap = results[0];
            waiver = results[2].data || null;
            readiness = {};
            (results[1].data || []).forEach(function (x) { readiness[x.id] = x; });
            if (!snap) { main.innerHTML = '<div class="state"><h2>Couldn’t load this event</h2></div>'; return; }
            render();
        }

        function render() {
            var head = kind === 't' ? snap.tournament : snap.league;
            var members = (kind === 't' ? snap.participants : snap.members) || [];
            var counts = { checked_in: 0, not_checked_in: 0, no_show: 0 };
            members.forEach(function (m) {
                var st = (readiness[m.id] || {}).check_in_status || m.check_in || 'not_checked_in';
                counts[st] = (counts[st] || 0) + 1;
            });

            var rows = members.filter(function (m) {
                return !search || (m.name || '').toLowerCase().indexOf(search.toLowerCase()) !== -1;
            }).sort(function (a, b) {
                // Not-checked-in first — that's who the desk is looking for.
                var sa = (readiness[a.id] || {}).check_in_status || 'not_checked_in';
                var sb = (readiness[b.id] || {}).check_in_status || 'not_checked_in';
                if (sa !== sb) return sa === 'not_checked_in' ? -1 : 1;
                return (a.name || '').localeCompare(b.name || '');
            }).map(function (m) {
                var st = (readiness[m.id] || {}).check_in_status || m.check_in || 'not_checked_in';
                var needsWaiver = (readiness[m.id] || {}).waiver_status === 'pending';
                var waiverBtn = needsWaiver && waiver
                    ? ' <button class="btn ghost" data-wv="' + m.id + '">Sign waiver</button>' : '';
                var action = st === 'checked_in'
                    ? '<span class="ci-chip ci-ready">READY</span> <button class="btn ghost" data-ci="' + m.id + ':not_checked_in">Undo</button>'
                    : st === 'no_show'
                        ? '<span class="ci-chip ci-noshow">NO-SHOW</span> <button class="btn ghost" data-ci="' + m.id + ':not_checked_in">Undo</button>'
                        : '<button class="btn primary" data-ci="' + m.id + ':checked_in" style="min-height:48px;padding:12px 22px">Check in</button>' +
                          '<button class="btn danger" data-ci="' + m.id + ':no_show" style="margin-left:6px">No-show</button>';
                return '<div class="event-row"><div class="grow">' +
                    '<div class="title">' + window.PCLive.avatarStack(m.members, 24) + ' ' + esc(m.name || 'Player') +
                    (needsWaiver ? ' <span class="ci-chip ci-noshow">WAIVER</span>' : '') + '</div>' +
                    (m.seed ? '<div class="sub">Seed ' + m.seed + '</div>' : '') +
                    '</div><div>' + action + waiverBtn + '</div></div>';
            }).join('');

            main.innerHTML =
                '<div class="event-head"><span class="kicker">Check-in desk</span>' +
                '<h1 style="font-size:1.4rem">' + esc(head.name) + '</h1>' +
                '<div class="event-meta">' +
                '<span class="chip status-done">' + counts.checked_in + ' ready</span>' +
                '<span class="chip">' + counts.not_checked_in + ' expected</span>' +
                (counts.no_show ? '<span class="chip status-live">' + counts.no_show + ' no-show</span>' : '') +
                '</div>' +
                '<div class="bar"><input id="search" type="search" placeholder="Type a name…" value="' + esc(search) + '"' +
                ' style="font-size:17px;padding:13px 16px;border:1px solid var(--rule-strong);border-radius:12px;background:var(--paper);color:var(--ink);width:100%;max-width:420px"></div></div>' +
                '<section class="section">' + (rows || '<p class="sub">No one matches that search.</p>') + '</section>';

            var input = document.getElementById('search');
            input.addEventListener('input', function () { search = input.value; render(); });
            if (search) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }

            Array.prototype.forEach.call(main.querySelectorAll('[data-wv]'), function (b) {
                b.addEventListener('click', async function () {
                    var name = prompt((waiver ? waiver.title + ' (v' + waiver.version + ')\n\n' : '') +
                        'Hand the device to the player to read the waiver on the event page, then type their FULL NAME here to sign:');
                    if (!name || name.trim().length < 2) return;
                    var r = await db.rpc('sign_event_waiver', {
                        p_scope: scope, p_event_id: eventId, p_signer_name: name.trim(),
                        p_registration_id: null, p_participant_id: b.dataset.wv,
                        p_user_agent: navigator.userAgent, p_source: 'staff' });
                    if (r.error) { alert(r.error.message); return; }
                    await refetch();
                });
            });
            Array.prototype.forEach.call(main.querySelectorAll('[data-ci]'), function (b) {
                b.addEventListener('click', async function () {
                    var parts = b.dataset.ci.split(':');
                    b.disabled = true;
                    var r = await db.rpc('set_check_in_status', {
                        p_scope: scope, p_participant_id: parts[0], p_status: parts[1], p_note: null, p_source: 'staff' });
                    if (r.error) { alert(r.error.message); b.disabled = false; return; }
                    await refetch();
                });
            });
        }

        (async function init() {
            var user = await PC.currentUser();
            if (!user) renderLogin();
            else await boot();
        })();
    })();
    </script>
</body>
</html>
