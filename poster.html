<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Poster · PickleCue</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="stylesheet" href="/fonts.css">
    <style>
        /* Print-first poster: always light/paper so it prints clean. */
        :root {
            --paper: #F4F1EA; --ink: #0C0F12; --ink-soft: #3D4248; --ink-mute: #6E7278;
            --rule: rgba(12,15,18,0.14); --court: #2E5E4E;
            --f-display: 'Fraunces', Georgia, serif;
            --f-body: 'Instrument Sans', -apple-system, sans-serif;
            --f-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--f-body); background: #e8e4da; color: var(--ink); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 24px 12px; }
        .poster {
            width: min(720px, 100%); background: var(--paper); border: 1px solid var(--rule);
            padding: clamp(32px, 6vw, 64px); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.12);
        }
        .brand { display: inline-flex; align-items: center; gap: 10px; font-family: var(--f-display); font-weight: 650; font-size: 1.25rem; }
        .brand img { width: 30px; height: 30px; border-radius: 7px; }
        .kicker { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-mute); margin-top: 26px; }
        h1 { font-family: var(--f-display); font-weight: 560; font-size: clamp(1.9rem, 5vw, 3rem); line-height: 1.08; letter-spacing: -0.02em; margin: 10px 0 4px; }
        .event { font-size: clamp(1rem, 2.5vw, 1.25rem); color: var(--ink-soft); margin-bottom: 30px; }
        #qr { display: inline-block; padding: 18px; background: #fff; border: 1px solid var(--rule); }
        #qr canvas, #qr img { display: block; width: min(340px, 70vw); height: auto; image-rendering: pixelated; }
        .url { font-family: var(--f-mono); font-size: 13px; color: var(--ink-soft); margin-top: 16px; word-break: break-all; }
        .hint { font-size: 15px; color: var(--ink-mute); margin-top: 18px; }
        .sponsor { margin-top: 34px; border-top: 1px dashed var(--rule); padding-top: 18px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); min-height: 48px; }
        .actions { margin: 20px 0 8px; display: flex; gap: 10px; }
        .actions button { font-family: var(--f-body); font-size: 14px; font-weight: 600; padding: 11px 22px; border-radius: 100px; border: 0; background: var(--ink); color: var(--paper); cursor: pointer; }
        @media print {
            body { background: #fff; padding: 0; }
            .poster { box-shadow: none; border: 0; width: 100%; }
            .actions { display: none; }
        }
    </style>
</head>
<body>
    <div class="actions"><button onclick="window.print()">Print poster</button></div>
    <div class="poster">
        <span class="brand"><img src="images/app-icon-120.png" alt="">PickleCue</span>
        <div class="kicker" id="kicker">Live event</div>
        <h1 id="title">Scan to follow live</h1>
        <div class="event" id="event"></div>
        <div id="qr"></div>
        <div class="url" id="url"></div>
        <p class="hint">Point your phone camera at the code — no app needed.</p>
        <div class="sponsor" id="sponsor">Sponsor space — ask about featuring your logo here</div>
    </div>
    <script>
    (function () {
        var q = new URLSearchParams(location.search);
        var url = q.get('u') || 'https://www.picklecue.com';
        // Only render QR codes for our own live pages — never arbitrary URLs.
        if (!/^https:\/\/(www\.)?picklecue\.com\//.test(url)) url = 'https://www.picklecue.com';
        var title = (q.get('title') || 'Scan to follow live').slice(0, 60);
        var eventName = (q.get('event') || '').slice(0, 80);
        var kicker = (q.get('kicker') || 'Live event').slice(0, 40);
        var sponsor = (q.get('sponsor') || '').slice(0, 80);
        if (sponsor) document.getElementById('sponsor').textContent = 'Presented by ' + sponsor;
        document.getElementById('title').textContent = title;
        document.getElementById('event').textContent = eventName;
        document.getElementById('kicker').textContent = kicker;
        document.getElementById('url').textContent = url.replace('https://www.', '');
        document.title = title + (eventName ? ' · ' + eventName : '') + ' · PickleCue';

        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js';
        s.onload = function () {
            var qr = window.qrcode(0, 'M');
            qr.addData(url);
            qr.make();
            document.getElementById('qr').innerHTML = qr.createImgTag(10, 0);
        };
        s.onerror = function () {
            document.getElementById('qr').innerHTML = '<p style="padding:40px 20px;font-size:14px;color:#666">QR unavailable offline — use the link below.</p>';
        };
        document.head.appendChild(s);
    })();
    </script>
</body>
</html>
