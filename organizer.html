<!DOCTYPE html>
<html lang="en" style="color-scheme: light dark;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script>(function(){try{var t=localStorage.getItem('pc_theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(_){}})();</script>
    <title>Organizer · PickleCue</title>
    <meta name="description" content="Run your PickleCue tournaments and leagues from the web — live scores, match control, and scorekeepers.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <meta name="theme-color" content="#F4F1EA" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0F1214" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="/fonts.css">
    <link rel="stylesheet" href="assets/live.css">
</head>
<body>
    <header class="live-head">
        <div class="page live-head-row">
            <a href="/" class="live-logo"><img src="images/app-icon-120.png" alt="">PickleCue <span class="kicker" style="margin-left:6px">Organizer</span></a>
            <span class="conn" id="conn" hidden><span class="dot"></span><span id="connLabel">Live</span></span>
            <button class="btn ghost" id="signOutBtn" hidden style="margin-left:auto">Sign out</button>
        </div>
    </header>

    <main class="page" id="main"><div class="state"><h2>Loading…</h2></div></main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="assets/live-core.js"></script>
    <script src="assets/bracket.js"></script>
    <script>
    (function () {
        'use strict';
        var PC = window.PCLive, esc = PC.esc, db = PC.client;
        var main = document.getElementById('main');
        var me = null, view = { mode: 'list' }, snap = null, unsub = null, eventTab = 'matches', qrOpen = false;
        var readiness = {}, ciFilter = 'all', ciSearch = '';
        var regSettings = null, regList = [], pairFirst = null;
        var waiver = null;

        document.getElementById('signOutBtn').addEventListener('click', async function () {
            await PC.signOut(); location.reload();
        });

        var PROD_BASE = 'https://www.picklecue.com/';

        function shareUrl(path) { return PROD_BASE + path; }

        function setConn(state) {
            var el = document.getElementById('conn');
            el.hidden = false;
            el.className = 'conn' + (state === 'live' ? ' live' : '');
            document.getElementById('connLabel').textContent = state === 'live' ? 'Live' : 'Reconnecting…';
        }

        // ---- auth -------------------------------------------------------------

        function renderLogin() {
            PC.renderAuthCard(main, { title: 'Organizer sign in', blurb: 'Run your events from the web. Organizer tools are for event organizers and assigned staff — creating events is part of PickleCue Pro.', onSignedIn: async function () { me = await PC.currentUser(); await loadList(); } });
        }

        async function doLogin() {
            var btn = document.getElementById('loginBtn');
            btn.disabled = true;
            document.getElementById('loginErr').textContent = '';
            try {
                me = await PC.signIn(document.getElementById('email').value.trim(), document.getElementById('pw').value);
                await loadList();
            } catch (e) {
                document.getElementById('loginErr').textContent = e.message || 'Sign in failed.';
                btn.disabled = false;
            }
        }

        // ---- my events ----------------------------------------------------------

        async function loadList() {
            document.getElementById('signOutBtn').hidden = false;
            main.innerHTML = '<div class="state"><h2>Loading your events…</h2></div>';
            var uid = me.id;
            var results = await Promise.all([
                db.from('tournaments').select('id,name,status,start_date,is_public').eq('organizer_id', uid).order('start_date', { ascending: false }).limit(50),
                db.from('leagues').select('id,name,status,start_date,is_public').eq('created_by', uid).order('start_date', { ascending: false }).limit(50),
                db.from('tournament_staff').select('tournament_id').eq('user_id', uid),
                db.from('league_staff').select('league_id').eq('user_id', uid),
                PC.isPro(),
            ]);
            var myT = results[0].data || [], myL = results[1].data || [];
            var staffT = (results[2].data || []).map(function (r) { return r.tournament_id; });
            var staffL = (results[3].data || []).map(function (r) { return r.league_id; });
            var pro = results[4];

            // Events where I'm staff but not organizer.
            var extraT = staffT.length ? (await db.from('tournaments').select('id,name,status,start_date,is_public').in('id', staffT)).data || [] : [];
            var extraL = staffL.length ? (await db.from('leagues').select('id,name,status,start_date,is_public').in('id', staffL)).data || [] : [];
            var mineIds = {};
            myT.concat(myL).forEach(function (e) { mineIds[e.id] = true; });

            if (!myT.length && !myL.length && !extraT.length && !extraL.length) {
                main.innerHTML = '<div class="state"><h2>' + (pro ? 'No events yet' : 'Organizer tools are part of PickleCue Pro') + '</h2>' +
                    '<p>' + (pro
                        ? 'Create a tournament or league in the PickleCue app — it will appear here, ready to run live from the web.'
                        : 'Create your first tournament or league in the PickleCue app with a Pro subscription, then run it live from here. Scorekeepers assigned by an organizer can also sign in on this page.') +
                    '</p></div>';
                return;
            }

            function row(e, kind, roleLabel) {
                return '<div class="event-row"><div class="grow">' +
                    '<div class="title">' + esc(e.name) + '</div>' +
                    '<div class="sub">' + (kind === 't' ? 'Tournament' : 'League') + ' · ' + esc(PC.statusLabel(e.status)) +
                    (e.start_date ? ' · ' + esc(PC.fmtDate(e.start_date)) : '') +
                    (e.is_public ? ' · Public' : ' · Private') + (roleLabel ? ' · ' + roleLabel : '') + '</div></div>' +
                    '<button class="btn" data-open="' + kind + ':' + e.id + '">Manage</button>' +
                    '<a class="btn ghost" href="live.html?' + kind + '=' + e.id + '" target="_blank" rel="noopener">Live page</a></div>';
            }

            var html = '<div class="bar" style="margin-top:12px"><button class="btn ghost" id="playerBookBtn">\uD83D\uDCD2 Player book (all events)</button></div>' +
                '<div id="playerBook" hidden></div>' +
                '<section class="section"><h2>Your events</h2>' +
                myT.map(function (e) { return row(e, 't'); }).join('') +
                myL.map(function (e) { return row(e, 'l'); }).join('') + '</section>';
            var staffRows = extraT.filter(function (e) { return !mineIds[e.id]; }).map(function (e) { return row(e, 't', 'Scorekeeper'); })
                .concat(extraL.filter(function (e) { return !mineIds[e.id]; }).map(function (e) { return row(e, 'l', 'Scorekeeper'); }));
            if (staffRows.length) html += '<section class="section"><h2>Assigned to you</h2>' + staffRows.join('') + '</section>';
            html += '<p class="foot-note">Creating and configuring events happens in the PickleCue app. This dashboard runs them live: scores, match control, corrections, and scorekeepers.</p>';
            main.innerHTML = html;

            var pbBtn = document.getElementById('playerBookBtn');
            if (pbBtn) pbBtn.addEventListener('click', async function () {
                var box = document.getElementById('playerBook');
                if (!box.hidden) { box.hidden = true; return; }
                pbBtn.disabled = true;
                var r = await db.rpc('organizer_player_book');
                pbBtn.disabled = false;
                if (r.error) { alert(r.error.message); return; }
                renderPlayerBook(box, r.data || []);
                box.hidden = false;
            });
            Array.prototype.forEach.call(main.querySelectorAll('[data-open]'), function (b) {
                b.addEventListener('click', function () {
                    var parts = b.dataset.open.split(':');
                    openEvent(parts[0], parts[1]);
                });
            });
        }

        // ---- event control room ---------------------------------------------------

        // ---- Club CRM v1: cross-event player book -----------------------------
        function renderPlayerBook(box, players) {
            var rows = players.map(function (p) {
                return '<div class="event-row"><div class="grow">' +
                    '<div class="title" style="font-size:14px">' + esc(p.name) +
                    (p.has_account ? '' : ' <span class="ci-chip ci-waiting">GUEST</span>') +
                    (p.no_shows ? ' <span class="ci-chip ci-noshow">' + p.no_shows + ' NO-SHOW' + (p.no_shows > 1 ? 'S' : '') + '</span>' : '') + '</div>' +
                    '<div class="sub">' + p.events + ' event' + (p.events > 1 ? 's' : '') + ' \u00b7 ' + esc(p.event_names || '') +
                    (p.skill ? ' \u00b7 ' + esc(p.skill) : '') + (p.dupr_id ? ' \u00b7 DUPR ' + esc(p.dupr_id) : '') +
                    ([p.email, p.phone].filter(Boolean).length ? ' \u00b7 ' + [p.email, p.phone].filter(Boolean).map(esc).join(' \u00b7 ') : '') +
                    '</div></div></div>';
            });
            box.innerHTML = '<section class="section"><h2>Player book <span class="count">' + players.length + '</span></h2>' +
                '<div class="bar"><input id="pbSearch" type="search" placeholder="Search players\u2026" style="font-size:15px;padding:10px 14px;border:1px solid var(--rule-strong);border-radius:10px;background:var(--paper);color:var(--ink);flex:1;max-width:320px">' +
                '<button class="btn ghost" id="pbExport">Export CSV</button></div>' +
                '<div id="pbRows">' + rows.join('') + '</div>' +
                '<p class="foot-note">Everyone who has ever played one of your events \u2014 attendance, no-shows, waivers, and the contact info they gave you at registration. Visible only to you.</p></section>';
            box.querySelector('#pbSearch').addEventListener('input', function () {
                var q = this.value.toLowerCase();
                Array.prototype.forEach.call(box.querySelectorAll('#pbRows .event-row'), function (r) {
                    r.style.display = r.textContent.toLowerCase().indexOf(q) !== -1 ? '' : 'none';
                });
            });
            box.querySelector('#pbExport').addEventListener('click', function () {
                var rows2 = [['name', 'has_account', 'events', 'event_names', 'checked_in', 'no_shows', 'waiver_signed', 'skill', 'dupr_id', 'email', 'phone', 'last_seen']];
                players.forEach(function (p) {
                    rows2.push([p.name, p.has_account, p.events, p.event_names || '', p.checked_in_count, p.no_shows,
                        p.waiver_signed, p.skill || '', p.dupr_id || '', p.email || '', p.phone || '', p.last_seen || '']);
                });
                downloadCsv('picklecue_player_book', rows2);
            });
        }

        async function openEvent(kind, id) {
            view = { mode: 'event', kind: kind, id: id };
            if (unsub) { unsub(); unsub = null; }
            await refetchEvent();
            if (!snap) return;
            var head = kind === 't' ? snap.tournament : snap.league;
            unsub = PC.subscribeLive(kind, id, head.is_public === true, refetchEvent, setConn);
        }

        async function refetchEvent() {
            if (view.mode !== 'event') return;
            snap = view.kind === 't' ? await PC.tournamentSnapshot(view.id) : await PC.leagueSnapshot(view.id);
            if (!snap) { main.innerHTML = '<div class="state"><h2>Couldn’t load this event</h2></div>'; return; }
            if (eventTab === 'checkin') {
                var r = await db.rpc('event_readiness', {
                    p_scope: view.kind === 't' ? 'tournament' : 'league', p_event_id: view.id });
                readiness = {};
                (r.data || []).forEach(function (x) { readiness[x.id] = x; });
            }
            if (eventTab === 'register') {
                var scope = view.kind === 't' ? 'tournament' : 'league';
                var results = await Promise.all([
                    db.from('event_registration_settings').select('*').eq('scope', scope).eq('event_id', view.id).maybeSingle(),
                    db.from('event_registrations').select('*').eq('event_id', view.id).order('created_at'),
                    db.rpc('get_event_waiver', { p_scope: scope, p_event_id: view.id }),
                ]);
                regSettings = results[0].data;
                regList = results[1].data || [];
                waiver = results[2].data || null;
            }
            renderEvent();
        }

        function renderEvent() {
            var kind = view.kind, isT = kind === 't';
            var head = isT ? snap.tournament : snap.league;
            var members = isT ? snap.participants : snap.members;
            var nameMap = {}, objMap = {};
            (members || []).forEach(function (m) { nameMap[m.id] = m.name || 'Player'; objMap[m.id] = m; });

            var liveUrl = location.origin + '/live.html?' + kind + '=' + view.id;
            var html = '<div class="event-head">' +
                '<span class="kicker">Control room</span>' +
                '<h1>' + esc(head.name) + '</h1>' +
                '<div class="bar">' +
                '<button class="btn ghost" id="backBtn">← All events</button>' +
                '<a class="btn ghost" href="' + liveUrl + '" target="_blank" rel="noopener">Open live page</a>' +
                '<button class="btn ghost" id="copyBtn">Copy live link</button>' +
                '<a class="btn ghost" href="scorekeeper.html?' + kind + '=' + view.id + '">Scorekeeper mode</a>' +
                '<button class="btn ghost" id="qrBtn">QR codes &amp; posters</button>' +
                '<button class="btn ghost" id="exportBtn">Export CSV</button>' +
                '</div><div id="qrPanel" hidden></div>' +
                '<div class="tabs" role="tablist">' +
                '<button class="tab" data-etab="matches" aria-selected="' + (eventTab === 'matches') + '">Matches</button>' +
                (isT && window.PCBracket.isElimination(snap)
                    ? '<button class="tab" data-etab="bracket" aria-selected="' + (eventTab === 'bracket') + '">Bracket</button>' : '') +
                '<button class="tab" data-etab="checkin" aria-selected="' + (eventTab === 'checkin') + '">Check-In</button>' +
                '<button class="tab" data-etab="register" aria-selected="' + (eventTab === 'register') + '">Registration</button></div>' +
                '<p class="ok" id="barMsg"></p></div>';

            var rows = (snap.matches || []).map(function (m) {
                var id1 = isT ? m.participant1_id : m.team1_member_id;
                var id2 = isT ? m.participant2_id : m.team2_member_id;
                var n1 = id1 ? (nameMap[id1] || 'Player') : 'TBD';
                var n2 = id2 ? (nameMap[id2] || 'Player') : 'TBD';
                var live = m.live && m.status !== 'completed' ? m.live : null;
                var ready = id1 && id2;
                var controls;
                if (m.status === 'completed') {
                    controls = '<span class="sub">Final: ' + esc(m.score_summary || '') + '</span> ' +
                        (isT ? '<button class="btn ghost" data-correct="' + m.id + '">Correct</button>' : '');
                } else if (!ready) {
                    controls = '<span class="sub">Waiting on earlier results</span>';
                } else {
                    controls = '<span class="scorebox">' +
                        '<input type="number" min="0" inputmode="numeric" id="s1-' + m.id + '" value="' + (live ? live.score1 : '') + '" placeholder="0">' +
                        '<span>–</span>' +
                        '<input type="number" min="0" inputmode="numeric" id="s2-' + m.id + '" value="' + (live ? live.score2 : '') + '" placeholder="0"></span> ' +
                        (m.status !== 'in_progress' ? '<button class="btn ghost" data-start="' + m.id + '">Start</button> ' : '') +
                        '<button class="btn ghost" data-save="' + m.id + '">Update</button> ' +
                        '<button class="btn primary" data-complete="' + m.id + '">Complete</button>';
                }
                return '<div class="event-row"><div class="grow">' +
                    '<div class="title">' + window.PCLive.avatarStack((objMap[id1] || {}).members, 18) + ' ' + esc(n1) +
                    ' vs ' + window.PCLive.avatarStack((objMap[id2] || {}).members, 18) + ' ' + esc(n2) + '</div>' +
                    '<div class="sub">' + (m.week ? 'Week ' + m.week : 'Round ' + (m.round || '?')) +
                    (m.court ? ' · ' + esc(m.court) : '') + ' · ' + esc(PC.statusLabel(m.status)) +
                    (live ? ' · live ' + live.score1 + '–' + live.score2 : '') + '</div></div>' +
                    '<div>' + controls + '</div></div>';
            });

            if (eventTab === 'bracket' && !(isT && window.PCBracket.isElimination(snap))) eventTab = 'matches';
            if (eventTab === 'register') {
                html += registrationTab();
            } else if (eventTab === 'checkin') {
                html += checkinTab(members || [], nameMap);
            } else if (eventTab === 'bracket') {
                html += '<section class="section"><div id="bvPanel"></div><div id="bvHost"></div></section>';
            } else {
                html += '<section class="section"><h2>Matches <span class="count">' + rows.length + '</span></h2>' + (rows.join('') || '<p class="sub">No matches yet — generate the schedule in the app.</p>') + '</section>';
            }
            html += '<section class="section"><h2>Scorekeepers</h2>' +
                '<p style="font-size:13.5px;color:var(--ink-mute);margin-bottom:10px">Assigned staff can enter scores for this event from the scorekeeper page without full organizer access. Assign and remove staff in the app under the event’s Players/Members screen.</p>' +
                '</section>';
            html += '<p class="foot-note">Every score change is written to a tamper-proof audit log and appears instantly on the live page, in the app, and here.</p>';

            main.innerHTML = html;

            Array.prototype.forEach.call(main.querySelectorAll('[data-etab]'), function (b) {
                b.addEventListener('click', function () {
                    eventTab = b.dataset.etab;
                    if (eventTab === 'checkin' || eventTab === 'register') refetchEvent(); else renderEvent();
                });
            });
            if (eventTab === 'bracket') {
                window.PCBracket.render(document.getElementById('bvHost'), snap, {
                    interactive: true,
                    onMatch: function (mid) { showBracketPanel(mid, nameMap); },
                });
            }
            if (eventTab === 'checkin') wireCheckin();
            if (eventTab === 'register') wireRegistration();
            document.getElementById('exportBtn').addEventListener('click', function () { exportMenu(head.name, nameMap); });
            document.getElementById('qrBtn').addEventListener('click', function () {
                qrOpen = !qrOpen;
                syncQrPanel(head.name);
            });
            syncQrPanel(head.name); // survive realtime re-renders
            document.getElementById('backBtn').addEventListener('click', function () {
                if (unsub) { unsub(); unsub = null; }
                view = { mode: 'list' };
                qrOpen = false;
                document.getElementById('conn').hidden = true;
                loadList();
            });
            document.getElementById('copyBtn').addEventListener('click', function () {
                navigator.clipboard.writeText(liveUrl).then(function () {
                    document.getElementById('barMsg').textContent = 'Live link copied — share it or print it as a QR code.';
                });
            });
            wire('[data-start]', 'start', function (mid) {
                return PC.recordScoreEvent({ scope: scopeName(), matchId: mid, eventType: 'match_started' });
            });
            wire('[data-save]', 'save', function (mid) {
                var s = scores(mid);
                return PC.recordScoreEvent({ scope: scopeName(), matchId: mid, eventType: 'point_added', score1: s[0], score2: s[1] });
            });
            wire('[data-complete]', 'complete', function (mid) {
                var s = scores(mid);
                if (s[0] === s[1]) throw new Error('A completed match needs a winner — scores can’t be tied.');
                if (!confirm('Mark this match final at ' + s[0] + '–' + s[1] + '? The bracket/standings update immediately.')) return Promise.resolve(null);
                return PC.recordScoreEvent({ scope: scopeName(), matchId: mid, eventType: 'match_completed', score1: s[0], score2: s[1] });
            });
            wire('[data-correct]', 'correct', function (mid) {
                var val = prompt('Corrected final score (e.g. 11-8). To change the winner, enter the true score and it will be applied as a new final.');
                if (!val) return Promise.resolve(null);
                var parts = val.split('-').map(function (x) { return parseInt(x.trim(), 10); });
                if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) throw new Error('Enter the score as two numbers, like 11-8.');
                return PC.recordScoreEvent({ scope: scopeName(), matchId: mid, eventType: 'match_completed', score1: parts[0], score2: parts[1], note: 'organizer web correction' });
            });
        }

        // ---- Registration ------------------------------------------------------
        function registrationTab() {
            var s = regSettings || {};
            var counts = { registered: 0, waitlisted: 0, withdrawn: 0, needed: 0 };
            regList.forEach(function (r) {
                counts[r.status] = (counts[r.status] || 0) + 1;
                if (r.status !== 'withdrawn' && r.partner_status === 'needed') counts.needed++;
            });
            var settingsCard = '<div class="event-row" style="flex-wrap:wrap;gap:14px">' +
                '<label class="bcheck" style="padding:0"><input type="checkbox" id="rsOpen"' + (s.registration_open ? ' checked' : '') + '><span>Registration open</span></label>' +
                '<label class="bcheck" style="padding:0"><input type="checkbox" id="rsWaitlist"' + (s.waitlist_enabled !== false ? ' checked' : '') + '><span>Waitlist when full</span></label>' +
                '<label class="bcheck" style="padding:0"><input type="checkbox" id="rsAutoPromote"' + (s.auto_promote_waitlist !== false ? ' checked' : '') + '><span>Auto-promote from waitlist</span></label>' +
                '<label class="bcheck" style="padding:0"><input type="checkbox" id="rsNeedPartner"' + (s.allow_need_partner !== false ? ' checked' : '') + '><span>Allow \u201cneed a partner\u201d</span></label>' +
                '<label class="bcheck" style="padding:0"><input type="checkbox" id="rsRequireDupr"' + (s.require_dupr ? ' checked' : '') + '><span>Require DUPR ID</span></label>' +
                '<span class="scorebox"><input type="number" min="2" id="rsCapacity" placeholder="Cap" value="' + (s.capacity || '') + '" style="width:70px"><span class="sub">capacity (blank = event max)</span></span>' +
                '<span class="scorebox"><input type="text" id="rsSponsor" maxlength="80" placeholder="Sponsor name" value="' + esc(s.sponsor_name || '') + '" style="width:140px">' +
                '<input type="url" id="rsSponsorUrl" maxlength="200" placeholder="https://sponsor.com" value="' + esc(s.sponsor_url || '') + '" style="width:170px"><span class="sub">shown on live pages &amp; posters</span></span>' +
                '<button class="btn primary" id="rsSave">Save settings</button><span class="ok" id="rsMsg"></span></div>';

            var wlPos = {};
            regList.filter(function (r) { return r.status === 'waitlisted'; })
                .sort(function (a, b) { return a.created_at < b.created_at ? -1 : 1; })
                .forEach(function (r, i) { wlPos[r.id] = i + 1; });
            var rows = regList.map(function (r) {
                var chip = r.status === 'registered' ? '<span class="ci-chip ci-ready">REGISTERED</span>'
                    : r.status === 'waitlisted' ? '<span class="ci-chip ci-waiting">WAITLIST #' + wlPos[r.id] + '</span>'
                    : '<span class="ci-chip ci-noshow">WITHDRAWN</span>';
                var partner = r.partner_status === 'needed' ? ' \u00b7 <strong>needs a partner</strong>'
                    : r.partner_status === 'complete' && r.partner_name ? ' \u00b7 w/ ' + esc(r.partner_name) : '';
                var contact = [r.email, r.phone].filter(Boolean).map(esc).join(' \u00b7 ');
                var pairBtn = r.status !== 'withdrawn' && r.partner_status === 'needed'
                    ? '<button class="btn ' + (pairFirst === r.id ? 'primary' : 'ghost') + '" data-pair="' + r.id + '">' +
                      (pairFirst === r.id ? 'Pick their partner\u2026' : 'Pair') + '</button> '
                    : '';
                var actions = pairBtn + (r.status === 'waitlisted'
                    ? '<button class="btn primary" data-reg="' + r.id + ':promote">Move in</button> <button class="btn ghost" data-reg="' + r.id + ':withdraw">Remove</button>'
                    : r.status === 'registered'
                        ? '<button class="btn ghost" data-reg="' + r.id + ':waitlist">To waitlist</button> <button class="btn danger" data-reg="' + r.id + ':withdraw">Withdraw</button>'
                        : '');
                return '<div class="event-row"><div class="grow">' +
                    '<div class="title">' + esc(r.display_name) + ' ' + chip + '</div>' +
                    '<div class="sub">' + (r.skill_level ? esc(r.skill_level) + ' \u00b7 ' : '') + (r.dupr_id ? 'DUPR ' + esc(r.dupr_id) + ' \u00b7 ' : '') +
                    contact + partner + (r.notes ? ' \u00b7 \uD83D\uDCDD ' + esc(r.notes) : '') +
                    ' \u00b7 ' + new Date(r.created_at).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) + '</div></div>' +
                    '<div>' + actions + '</div></div>';
            }).join('');

            var signedCount = 0, pendingCount = 0;
            (Object.values(readiness) || []).forEach(function (x) {
                if (x.waiver_status === 'signed') signedCount++;
                if (x.waiver_status === 'pending') pendingCount++;
            });
            var waiverCard = '<div class="event-row" style="flex-wrap:wrap;gap:12px;align-items:flex-start">' +
                '<div class="grow" style="min-width:260px">' +
                '<div class="title" style="margin-bottom:6px">Event waiver ' +
                (waiver ? '<span class="ci-chip ci-ready">v' + waiver.version + ' PUBLISHED</span>' : '<span class="ci-chip ci-waiting">NONE</span>') + '</div>' +
                '<input id="wvTitle" placeholder="Waiver title (e.g. Release of Liability)" value="' + esc(waiver ? waiver.title : '') + '"' +
                ' style="width:100%;font-size:14px;padding:9px 12px;border:1px solid var(--rule-strong);border-radius:8px;background:var(--paper);color:var(--ink);margin-bottom:8px">' +
                '<textarea id="wvBody" rows="5" placeholder="Paste your waiver text (have your attorney review it)…"' +
                ' style="width:100%;font-size:13px;padding:10px 12px;border:1px solid var(--rule-strong);border-radius:8px;background:var(--paper);color:var(--ink);font-family:var(--f-body)">' + esc(waiver ? waiver.body : '') + '</textarea>' +
                '<div class="bar" style="margin:8px 0 0">' +
                '<label class="bcheck" style="padding:0"><input type="checkbox" id="wvRequired"' + (!waiver || waiver.required ? ' checked' : '') + '><span>Require signature</span></label>' +
                '<label class="bcheck" style="padding:0"><input type="checkbox" id="wvBlock"' + (waiver && waiver.blocks_checkin ? ' checked' : '') + '><span>Block check-in until signed</span></label>' +
                '<button class="btn primary" id="wvPublish">' + (waiver ? 'Publish new version' : 'Publish waiver') + '</button>' +
                '</div>' +
                (waiver ? '<p class="sub" style="margin-top:8px">' + signedCount + ' signed \u00b7 ' + pendingCount + ' pending. Publishing a new version requires everyone to re-sign. Signatures record name, time, IP, and waiver version \u2014 visible only to you and staff.</p>'
                        : '<p class="sub" style="margin-top:8px">Registrants sign during registration; staff can sign walk-ups at the check-in desk. For youth guests, collect guardian signatures on paper until guardian flow ships.</p>') +
                '</div></div>';
            return '<section class="section"><h2>Registration settings</h2>' + settingsCard + '<h2 style="margin-top:18px">Waiver</h2>' + waiverCard +
                '<h2 style="margin-top:18px">Registrations <span class="count">' + counts.registered + ' in \u00b7 ' + counts.waitlisted + ' waitlisted' +
                (counts.needed ? ' \u00b7 ' + counts.needed + ' need partners' : '') + '</span></h2>' +
                (rows || '<p class="sub">No registrations yet. Open registration above, then share the live page or a QR poster \u2014 the Register button appears automatically.</p>') +
                '<p class="foot-note">Emails, phones, and notes are visible only to you and your event staff \u2014 never on public pages. Moving someone in creates their participant record instantly, so they show up in Check-In and What\u2019s Next.</p></section>';
        }

        function wireRegistration() {
            var save = document.getElementById('rsSave');
            if (save) save.addEventListener('click', async function () {
                save.disabled = true;
                var scope = view.kind === 't' ? 'tournament' : 'league';
                var payload = {
                    scope: scope, event_id: view.id,
                    registration_open: document.getElementById('rsOpen').checked,
                    waitlist_enabled: document.getElementById('rsWaitlist').checked,
                    auto_promote_waitlist: document.getElementById('rsAutoPromote').checked,
                    allow_need_partner: document.getElementById('rsNeedPartner').checked,
                    require_dupr: document.getElementById('rsRequireDupr').checked,
                    capacity: parseInt(document.getElementById('rsCapacity').value, 10) || null,
                    sponsor_name: document.getElementById('rsSponsor').value.trim() || null,
                    sponsor_url: (function (u) { return /^https?:\/\//.test(u) ? u : null; })(document.getElementById('rsSponsorUrl').value.trim()),
                    updated_by: me.id, updated_at: new Date().toISOString(),
                };
                var r = await db.from('event_registration_settings').upsert(payload, { onConflict: 'scope,event_id' }).select();
                if (!r.error && payload.capacity) {
                    var cap = await db.rpc('set_registration_capacity', { p_scope: scope, p_event_id: view.id, p_capacity: payload.capacity });
                    if (cap.error) r = cap;
                }
                save.disabled = false;
                if (r.error) { alert(r.error.message); return; }
                document.getElementById('rsMsg').textContent = 'Saved \u2014 the Register button is now ' + (payload.registration_open ? 'live on the public page.' : 'hidden.');
                refetchEvent();
            });
            Array.prototype.forEach.call(main.querySelectorAll('[data-reg]'), function (b) {
                b.addEventListener('click', async function () {
                    var parts = b.dataset.reg.split(':');
                    b.disabled = true;
                    var r = await db.rpc('manage_registration', { p_registration_id: parts[0], p_action: parts[1] });
                    if (r.error) { alert(r.error.message); b.disabled = false; return; }
                    refetchEvent();
                });
            });
            var wvBtn = document.getElementById('wvPublish');
            if (wvBtn) wvBtn.addEventListener('click', async function () {
                var title = document.getElementById('wvTitle').value.trim();
                var body = document.getElementById('wvBody').value.trim();
                if (!title || !body) { alert('Add a waiver title and text first.'); return; }
                if (waiver && !confirm('Publish as a NEW version? Everyone will need to re-sign.')) return;
                wvBtn.disabled = true;
                var r = await db.rpc('set_event_waiver', {
                    p_scope: view.kind === 't' ? 'tournament' : 'league', p_event_id: view.id,
                    p_title: title, p_body: body,
                    p_required: document.getElementById('wvRequired').checked,
                    p_blocks_checkin: document.getElementById('wvBlock').checked });
                wvBtn.disabled = false;
                if (r.error) { alert(r.error.message); return; }
                refetchEvent();
            });
            Array.prototype.forEach.call(main.querySelectorAll('[data-pair]'), function (b) {
                b.addEventListener('click', async function () {
                    var id = b.dataset.pair;
                    if (!pairFirst) { pairFirst = id; renderEvent(); return; }
                    if (pairFirst === id) { pairFirst = null; renderEvent(); return; }
                    var a = regList.find(function (x) { return x.id === pairFirst; });
                    var bb = regList.find(function (x) { return x.id === id; });
                    if (!confirm('Pair ' + a.display_name + ' with ' + bb.display_name + '? They become one team.')) return;
                    var r = await db.rpc('pair_registrations', { p_reg_a: pairFirst, p_reg_b: id });
                    pairFirst = null;
                    if (r.error) { alert(r.error.message); renderEvent(); return; }
                    refetchEvent();
                });
            });
        }

        // ---- Check-In / Event Readiness --------------------------------------
        function ciStatusOf(m) {
            var r = readiness[m.id] || {};
            return r.check_in_status || m.check_in || 'not_checked_in';
        }

        function checkinTab(members, nameMap) {
            var counts = { checked_in: 0, not_checked_in: 0, no_show: 0 };
            members.forEach(function (m) { counts[ciStatusOf(m)] = (counts[ciStatusOf(m)] || 0) + 1; });

            var chips = [
                ['all', 'All \u00b7 ' + members.length],
                ['not_checked_in', 'Not checked in \u00b7 ' + counts.not_checked_in],
                ['checked_in', 'Ready \u00b7 ' + counts.checked_in],
                ['no_show', 'No-shows \u00b7 ' + counts.no_show],
            ].map(function (c) {
                return '<button class="tab" data-ci-filter="' + c[0] + '" aria-selected="' + (ciFilter === c[0]) + '">' + c[1] + '</button>';
            }).join('');

            var rows = members.filter(function (m) {
                if (ciFilter !== 'all' && ciStatusOf(m) !== ciFilter) return false;
                if (ciSearch && (m.name || '').toLowerCase().indexOf(ciSearch.toLowerCase()) === -1) return false;
                return true;
            }).map(function (m) {
                var st = ciStatusOf(m);
                var r = readiness[m.id] || {};
                var chip = st === 'checked_in'
                    ? '<span class="ci-chip ci-ready">READY</span>'
                    : st === 'no_show'
                        ? '<span class="ci-chip ci-noshow">NO-SHOW</span>'
                        : '<span class="ci-chip ci-waiting">NOT CHECKED IN</span>';
                var extras = [];
                if (r.waiver_status === 'pending') extras.push('<strong style="color:var(--clay)">Waiver: needs signature</strong>');
                else if (r.waiver_status === 'signed') extras.push('Waiver: \u2713 signed');
                if (r.payment_status && r.payment_status !== 'not_required') extras.push('Payment: ' + esc(r.payment_status));
                if (r.registration_status === 'withdrew') extras.push('WITHDREW');
                if (r.last_note) extras.push('\uD83D\uDCDD ' + esc(r.last_note));
                var actions = st === 'checked_in'
                    ? '<button class="btn ghost" data-ci="' + m.id + ':not_checked_in">Undo</button>'
                    : '<button class="btn primary" data-ci="' + m.id + ':checked_in">Check in</button> ' +
                      (st === 'no_show'
                        ? '<button class="btn ghost" data-ci="' + m.id + ':not_checked_in">Undo</button>'
                        : '<button class="btn danger" data-ci="' + m.id + ':no_show">No-show</button>');
                return '<div class="event-row"><div class="grow">' +
                    '<div class="title">' + window.PCLive.avatarStack(m.members, 20) + ' ' + esc(m.name || 'Player') + ' ' + chip + '</div>' +
                    '<div class="sub">' + (m.seed ? 'Seed ' + m.seed + ' \u00b7 ' : '') +
                    (r.checked_in_at ? 'Checked in ' + new Date(r.checked_in_at).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : '') +
                    (extras.length ? ' \u00b7 ' + extras.join(' \u00b7 ') : '') + '</div></div>' +
                    '<div>' + actions + ' <button class="btn ghost" data-ci-note="' + m.id + '">Note</button></div></div>';
            }).join('');

            return '<section class="section"><h2>Event readiness</h2>' +
                '<div class="bar"><input id="ciSearch" type="search" placeholder="Search players or teams\u2026" value="' + esc(ciSearch) + '"' +
                ' style="font-size:15px;padding:10px 14px;border:1px solid var(--rule-strong);border-radius:10px;background:var(--paper);color:var(--ink);flex:1;max-width:320px">' +
                '<div class="tabs" style="margin:0">' + chips + '</div></div>' +
                (rows || '<p class="sub">No one matches this filter.</p>') +
                '<p class="foot-note">Every check-in, undo, and no-show is written to the event audit log with who did it and when. Waiver and payment columns light up automatically when those systems launch.</p></section>';
        }

        function wireCheckin() {
            var search = document.getElementById('ciSearch');
            if (search) {
                search.addEventListener('input', function () { ciSearch = search.value; renderEvent(); });
                if (ciSearch) { search.focus(); search.setSelectionRange(search.value.length, search.value.length); }
            }
            Array.prototype.forEach.call(main.querySelectorAll('[data-ci-filter]'), function (b) {
                b.addEventListener('click', function () { ciFilter = b.dataset.ciFilter; renderEvent(); });
            });
            Array.prototype.forEach.call(main.querySelectorAll('[data-ci]'), function (b) {
                b.addEventListener('click', async function () {
                    var parts = b.dataset.ci.split(':');
                    b.disabled = true;
                    try {
                        var r = await db.rpc('set_check_in_status', {
                            p_scope: view.kind === 't' ? 'tournament' : 'league',
                            p_participant_id: parts[0], p_status: parts[1], p_note: null, p_source: 'web' });
                        if (r.error) throw r.error;
                        await refetchEvent();
                    } catch (e) { alert(e.message || 'Check-in failed'); b.disabled = false; }
                });
            });
            Array.prototype.forEach.call(main.querySelectorAll('[data-ci-note]'), function (b) {
                b.addEventListener('click', async function () {
                    var note = prompt('Note for this participant (visible to organizers and staff only):');
                    if (!note) return;
                    var m = readiness[b.dataset.ciNote] || {};
                    var r = await db.rpc('set_check_in_status', {
                        p_scope: view.kind === 't' ? 'tournament' : 'league',
                        p_participant_id: b.dataset.ciNote,
                        p_status: m.check_in_status || 'not_checked_in',
                        p_note: note, p_source: 'web' });
                    if (r.error) alert(r.error.message); else refetchEvent();
                });
            });
        }

        // ---- CSV exports (results / registrations / readiness) ----------------
        function csvCell(v) {
            v = v == null ? '' : String(v);
            return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
        }
        function downloadCsv(name, rows) {
            var blob = new Blob([rows.map(function (r) { return r.map(csvCell).join(','); }).join('\n')],
                { type: 'text/csv;charset=utf-8' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name.replace(/[^a-z0-9]+/gi, '_') + '.csv';
            a.click();
            setTimeout(function () { URL.revokeObjectURL(a.href); }, 500);
        }

        async function exportMenu(eventName, nameMap) {
            var choice = prompt('Export which CSV?\n1 = Match results\n2 = Registrations (incl. contact info)\n3 = Check-in / readiness\n\nType 1, 2, or 3:');
            var isT = view.kind === 't';
            var scope = isT ? 'tournament' : 'league';
            if (choice === '1') {
                var rows = [['round', 'match', 'court', 'side_1', 'side_2', 'score', 'winner', 'status']];
                (snap.matches || []).forEach(function (m) {
                    var id1 = isT ? m.participant1_id : m.team1_member_id;
                    var id2 = isT ? m.participant2_id : m.team2_member_id;
                    var w = isT ? m.winner_id : m.winner_member_id;
                    rows.push([m.round || '', m.match_number || '', m.court || '',
                        id1 ? (nameMap[id1] || '') : '', id2 ? (nameMap[id2] || '') : '',
                        m.score_summary || '', w ? (nameMap[w] || '') : '', m.status || '']);
                });
                downloadCsv(eventName + '_results', rows);
            } else if (choice === '2') {
                var r = await db.from('event_registrations').select('*').eq('event_id', view.id).order('created_at');
                if (r.error) { alert(r.error.message); return; }
                var rows2 = [['name', 'status', 'email', 'phone', 'skill', 'dupr_id', 'partner_status', 'partner_name', 'notes', 'registered_at']];
                (r.data || []).forEach(function (x) {
                    rows2.push([x.display_name, x.status, x.email || '', x.phone || '', x.skill_level || '',
                        x.dupr_id || '', x.partner_status, x.partner_name || '', x.notes || '', x.created_at]);
                });
                downloadCsv(eventName + '_registrations', rows2);
            } else if (choice === '3') {
                var rr = await db.rpc('event_readiness', { p_scope: scope, p_event_id: view.id });
                if (rr.error) { alert(rr.error.message); return; }
                var rows3 = [['name', 'seed', 'check_in', 'checked_in_at', 'waiver', 'payment', 'registration_status', 'note']];
                (rr.data || []).forEach(function (x) {
                    var m = (isT ? snap.participants : snap.members).find(function (y) { return y.id === x.id; }) || {};
                    rows3.push([m.name || '', m.seed || '', x.check_in_status, x.checked_in_at || '',
                        x.waiver_status, x.payment_status, x.registration_status || '', x.last_note || '']);
                });
                downloadCsv(eventName + '_readiness', rows3);
            }
        }

        function syncQrPanel(eventName) {
            var panel = document.getElementById('qrPanel');
            if (!panel) return;
            panel.hidden = !qrOpen;
            if (qrOpen && !panel.innerHTML) renderQrPanel(panel, eventName);

            targets.push({ label: 'Court board', path: 'live.html?' + kind + '=' + view.id + '&view=courts', poster: 'Scan for court assignments' });
            targets.push({ label: 'Court board (TV mode)', path: 'live.html?' + kind + '=' + view.id + '&view=courts&display=tv', poster: null });
            targets.push({ label: 'Scorekeeper page (staff only)', path: 'scorekeeper.html?' + kind + '=' + view.id, poster: null });

                    '</div>';
            }).join('') +
            '<p class="sub" style="font-size:12px;color:var(--ink-mute);margin-top:6px">Posters open print-ready with a large QR code, your event name, and a sponsor slot. The scorekeeper link only works for staff you have assigned — safe to hand to volunteers, useless to anyone else.</p></div>';

            var shortBtn = panel.querySelector('[data-copy-short]');
            if (shortBtn) shortBtn.addEventListener('click', function () {
                navigator.clipboard.writeText('https://www.picklecue.com/e/' + shortCode).then(function () {
                    shortBtn.textContent = 'Copied!';
                    setTimeout(function () { shortBtn.textContent = 'Copy'; }, 1500);
                });
            });
            var staffBtn = panel.querySelector('#staffCodeBtn');
            if (staffBtn) staffBtn.addEventListener('click', async function () {
                if (!confirm('Generate a new staff code? Any previous code for this event stops working.')) return;

        // Control panel for a match tapped on the organizer bracket.
        function showBracketPanel(mid, nameMap) {
            var m = (snap.matches || []).find(function (x) { return x.id === mid; });
            if (!m) return;
            var isT = view.kind === 't';
            var id1 = isT ? m.participant1_id : m.team1_member_id;
            var id2 = isT ? m.participant2_id : m.team2_member_id;
            var n1 = id1 ? (nameMap[id1] || 'Player') : 'TBD';
            var n2 = id2 ? (nameMap[id2] || 'Player') : 'TBD';
            var live = m.live && m.status !== 'completed' ? m.live : null;
            var ready = id1 && id2;
            var panel = document.getElementById('bvPanel');
            var controls;
            if (m.status === 'completed') {
                controls = '<span class="sub">Final: ' + esc(m.score_summary || '') + '</span> ' +
                    (isT ? '<button class="btn ghost" data-correct="' + m.id + '">Correct</button>' : '');
            } else if (!ready) {
                controls = '<span class="sub">Waiting on earlier results</span>';
            } else {
                controls = '<span class="scorebox">' +
                    '<input type="number" min="0" inputmode="numeric" id="s1-' + m.id + '" value="' + (live ? live.score1 : '') + '" placeholder="0">' +
                    '<span>–</span>' +
                    '<input type="number" min="0" inputmode="numeric" id="s2-' + m.id + '" value="' + (live ? live.score2 : '') + '" placeholder="0"></span> ' +
                    (m.status !== 'in_progress' ? '<button class="btn ghost" data-start="' + m.id + '">Start</button> ' : '') +
                    '<button class="btn ghost" data-save="' + m.id + '">Update</button> ' +
                    '<button class="btn primary" data-complete="' + m.id + '">Complete</button>';
            }
            var court = '<span class="scorebox"><input type="text" id="court-' + m.id + '" value="' + esc(m.court || '') + '" placeholder="Court" style="width:90px"></span> ' +
                '<button class="btn ghost" data-court="' + m.id + '">Set court</button>';
            panel.innerHTML = '<div class="event-row"><div class="grow">' +
                '<div class="title">' + esc(n1) + ' vs ' + esc(n2) + '</div>' +
                '<div class="sub">Round ' + (m.round || '?') + (m.court ? ' · ' + esc(m.court) : '') + ' · ' + esc(PC.statusLabel(m.status)) + '</div></div>' +
                '<div>' + controls + ' ' + court + '</div></div>';
            wire('[data-start]', 'start', function (id) {
                return PC.recordScoreEvent({ scope: scopeName(), matchId: id, eventType: 'match_started' });
            });
            wire('[data-save]', 'save', function (id) {
                var s = scores(id);
                return PC.recordScoreEvent({ scope: scopeName(), matchId: id, eventType: 'point_added', score1: s[0], score2: s[1] });
            });
            wire('[data-complete]', 'complete', function (id) {
                var s = scores(id);
                if (s[0] === s[1]) throw new Error('A completed match needs a winner.');
                if (!confirm('Mark this match final at ' + s[0] + '\u2013' + s[1] + '? The winner advances immediately.')) return Promise.resolve(null);
                return PC.recordScoreEvent({ scope: scopeName(), matchId: id, eventType: 'match_completed', score1: s[0], score2: s[1] });
            });
            wire('[data-correct]', 'correct', function (id) {
                var val = prompt('Corrected final score (e.g. 11-8). Changing the winner repairs the next round.');
                if (!val) return Promise.resolve(null);
                var parts = val.split('-').map(function (x) { return parseInt(x.trim(), 10); });
                if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) throw new Error('Enter the score as two numbers, like 11-8.');
                return PC.recordScoreEvent({ scope: scopeName(), matchId: id, eventType: 'match_completed', score1: parts[0], score2: parts[1], note: 'organizer web correction' });
            });
            wire('[data-court]', 'set court', function (id) {
                // Court assignment is a plain RLS-gated update (same field the
                // app writes); scorer-only per tournament_matches UPDATE policy.
                var value = document.getElementById('court-' + id).value.trim() || null;
                var table = view.kind === 't' ? 'tournament_matches' : 'league_matches';
                var patch = view.kind === 't' ? { court_label: value } : { notes: value };
                return db.from(table).update(patch).eq('id', id).select('id').then(function (r) {
                    if (r.error) throw r.error;
                    if (!r.data || !r.data.length) throw new Error('Not allowed to assign courts for this event.');
                });
            });
        }

        function scopeName() { return view.kind === 't' ? 'tournament' : 'league'; }
        function scores(mid) {
            return [parseInt(document.getElementById('s1-' + mid).value, 10) || 0,
                    parseInt(document.getElementById('s2-' + mid).value, 10) || 0];
        }
        function wire(selector, label, fn) {
            Array.prototype.forEach.call(main.querySelectorAll(selector), function (b) {
                b.addEventListener('click', async function () {
                    var mid = b.dataset.start || b.dataset.save || b.dataset.complete || b.dataset.correct;
                    b.disabled = true;
                    try {
                        await fn(mid);
                        await refetchEvent();
                    } catch (e) {
                        alert(e.message || ('Couldn’t ' + label + ' — try again.'));
                        b.disabled = false;
                    }
                });
            });
        }

        // ---- boot -------------------------------------------------------------

        (async function init() {
            me = await PC.currentUser();
            if (!me) renderLogin();
            else await loadList();
        })();
    })();
    </script>
</body>
</html>
