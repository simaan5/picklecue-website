; Inland Empire Electronics — PHP runtime tuning for WooCommerce + imports.
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
max_input_vars = 5000

; Sessions / opcache for performance
opcache.enable = 1
opcache.memory_consumption = 192
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 2
opcache.jit = tracing
opcache.jit_buffer_size = 64M

; Hide PHP version, do not leak errors to visitors
expose_php = Off
display_errors = Off
log_errors = On
error_log = /var/www/html/wp-content/debug.log

date.timezone = America/Los_Angeles
