# =============================================================================
# Inland Empire Electronics — site server block.
#
# Local dev: only the HTTP (port 80) block is used.
# Production: uncomment the HTTPS block after issuing a Let's Encrypt cert
#             (see docker-compose.staging.yml) OR terminate TLS upstream
#             (Cloudflare Tunnel / existing reverse proxy on the Anstelias box).
# =============================================================================

upstream php_backend {
    server wordpress:9000;
}

# ---- Security / cache helpers ----------------------------------------------
map $sent_http_content_type $expires {
    default                    off;
    text/css                   30d;
    application/javascript     30d;
    ~image/                    60d;
    ~font/                     180d;
}

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php;

    # ACME http-01 challenge (Let's Encrypt)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # --- Production redirect to HTTPS (enable once certs exist) --------------
    # return 301 https://$host$request_uri;

    expires $expires;

    # Block access to sensitive files
    location ~* /(?:\.|wp-config\.php|readme\.html|license\.txt|xmlrpc\.php) {
        deny all;
    }
    location ~* \.(?:sql|bak|log|ini|conf|sh|env)$ {
        deny all;
    }

    # Static assets
    location ~* \.(?:css|js|gif|jpe?g|png|webp|svg|ico|woff2?|ttf|otf|mp4)$ {
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }
}

